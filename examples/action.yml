name: 'Cultivator - Terragrunt Automation'
description: 'Automate Terragrunt plan and apply operations from Pull Requests'
author: 'Cultivator Contributors'

branding:
  icon: 'git-pull-request'
  color: 'green'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
  config-file:
    description: 'Path to cultivator configuration file'
    required: false
    default: 'cultivator.yml'
  working-directory:
    description: 'Working directory for Terragrunt commands'
    required: false
    default: '.'
  auto-plan:
    description: 'Automatically run plan on PR updates'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        
    - name: Install Cultivator
      shell: bash
      run: |
        go install github.com/cultivator-dev/cultivator/cmd/cultivator@latest
        
    - name: Run Cultivator
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        CULTIVATOR_CONFIG: ${{ inputs.config-file }}
        CULTIVATOR_AUTO_PLAN: ${{ inputs.auto-plan }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF: ${{ github.ref }}
        GITHUB_SHA: ${{ github.sha }}
      working-directory: ${{ inputs.working-directory }}
      run: |
        cultivator run
