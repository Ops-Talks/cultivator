name: 'Cultivator - Terragrunt Orchestrator'
description: 'Install and run Cultivator commands in GitHub Actions'
author: 'Cultivator Contributors'

branding:
  icon: 'git-pull-request'
  color: 'green'

inputs:
  command:
    description: 'Cultivator command: doctor, plan, apply, or destroy'
    required: true
    default: 'plan'
  working-directory:
    description: 'Working directory'
    required: false
    default: '.'
  cultivator-version:
    description: 'Cultivator release version'
    required: false
    default: 'v0.2.7'
  terragrunt-version:
    description: 'Terragrunt release version'
    required: false
    default: '0.99.0'
  tofu-version:
    description: 'OpenTofu release version'
    required: false
    default: '1.11.5'
  root:
    description: 'Root directory to discover stacks'
    required: false
    default: 'providers'
  env:
    description: 'Optional environment filter'
    required: false
    default: ''
  parallelism:
    description: 'Max parallel stack executions'
    required: false
    default: '4'
  output-format:
    description: 'Output format: text or json'
    required: false
    default: 'text'
  non-interactive:
    description: 'Pass non-interactive mode to Terragrunt'
    required: false
    default: 'true'
  auto-approve:
    description: 'Auto-approve for apply/destroy'
    required: false
    default: 'false'
  config-file:
    description: 'Optional config file path passed via --config'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install tools
      shell: bash
      run: |
        set -euo pipefail

        sudo apt-get update
        sudo apt-get install -y wget unzip curl

        wget -q https://github.com/opentofu/opentofu/releases/download/v${{ inputs.tofu-version }}/tofu_${{ inputs.tofu-version }}_linux_amd64.zip
        sudo unzip -q tofu_${{ inputs.tofu-version }}_linux_amd64.zip -d /usr/local/bin
        rm tofu_${{ inputs.tofu-version }}_linux_amd64.zip

        wget -q -O terragrunt \
          https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt-version }}/terragrunt_linux_amd64
        chmod +x terragrunt
        sudo mv terragrunt /usr/local/bin/terragrunt

        wget -q -O cultivator \
          https://github.com/Ops-Talks/cultivator/releases/download/${{ inputs.cultivator-version }}/cultivator-linux-amd64
        chmod +x cultivator
        sudo mv cultivator /usr/local/bin/cultivator

    - name: Run Cultivator
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        cmd="${{ inputs.command }}"
        case "$cmd" in
          doctor|plan|apply|destroy) ;;
          *)
            echo "invalid command: $cmd (allowed: doctor, plan, apply, destroy)" >&2
            exit 2
            ;;
        esac

        args=()
        if [[ -n "${{ inputs.config-file }}" ]]; then
          args+=(--config "${{ inputs.config-file }}")
        fi
        if [[ "$cmd" != "doctor" ]]; then
          args+=(--root "${{ inputs.root }}")
          if [[ -n "${{ inputs.env }}" ]]; then
            args+=(--env "${{ inputs.env }}")
          fi
          args+=(--parallelism "${{ inputs.parallelism }}")
          args+=(--output-format "${{ inputs.output-format }}")
          args+=(--non-interactive="${{ inputs.non-interactive }}")
        else
          args+=(--root "${{ inputs.root }}")
        fi

        if [[ "$cmd" == "apply" || "$cmd" == "destroy" ]]; then
          args+=(--auto-approve="${{ inputs.auto-approve }}")
        fi

        cultivator "$cmd" "${args[@]}"
