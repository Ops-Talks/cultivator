# Example GitHub Actions workflow for using Cultivator in your own infrastructure repository.
# Copy this file to .github/workflows/cultivator.yml in your infra repo and adjust paths as needed.
#
# This workflow uses Magic Mode to only plan changed modules on Pull Requests,
# while maintaining DAG-aware execution order for both plan and apply.

name: Cultivator Plan & Apply

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'live/**'
      - 'cultivator.yml'
      - '.github/workflows/cultivator.yml'
  push:
    branches:
      - main
    paths:
      - 'live/**'
      - 'cultivator.yml'

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  plan:
    name: Terragrunt Plan (Magic Mode)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git diff to work correctly

      # Add your cloud provider authentication step here.

      - name: Run Cultivator plan
        uses: Ops-Talks/cultivator@v0.4.1
        with:
          command: plan
          root: live
          # Enable Magic Mode: only target modules affected by Git changes
          changed-only: 'true'
          base: ${{ github.base_ref }}
          non-interactive: 'true'

  apply:
    name: Terragrunt Apply (DAG Ordered)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Add your cloud provider authentication step here.

      - name: Run Cultivator apply
        uses: Ops-Talks/cultivator@v0.4.1
        with:
          command: apply
          root: live
          env: prod
          non-interactive: 'true'
          auto-approve: 'true'
          # DAG execution order is automatically applied to ensure safe deployment sequence.
