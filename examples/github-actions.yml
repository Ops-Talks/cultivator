# Example GitHub Actions workflow for using Cultivator in your own infrastructure repository.
# Copy this file to .github/workflows/cultivator.yml in your infra repo and adjust paths as needed.
#
# This workflow uses the Cultivator GitHub Action (action.yml) to run plan on pull requests
# and apply on merge to main. Add your cloud provider credential steps before the Cultivator
# steps as required by your environment.

name: Cultivator Plan & Apply

on:
  pull_request:
    paths:
      - 'live/**'
      - 'cultivator.yml'
      - '.github/workflows/cultivator.yml'
  push:
    branches:
      - main
    paths:
      - 'live/**'
      - 'cultivator.yml'

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Add your cloud provider authentication step here, for example:
      # - uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.IAM_ROLE_ARN }}
      #     aws-region: us-east-1
      #
      # - uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
      #
      # - uses: azure/login@v2
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Cultivator plan
        uses: Ops-Talks/cultivator@v0.2.7
        with:
          command: plan
          root: live
          env: dev
          non-interactive: 'true'

  apply:
    name: Terragrunt Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Add your cloud provider authentication step here (see plan job above for examples).

      - name: Run Cultivator apply
        uses: Ops-Talks/cultivator@v0.2.7
        with:
          command: apply
          root: live
          env: prod
          non-interactive: 'true'
          auto-approve: 'true'
