site_name: Cultivator
site_description: CI/CD automation tool for Terragrunt workflows
site_url: https://Ops-Talks.github.io/cultivator
repo_url: https://github.com/Ops-Talks/cultivator
repo_name: Ops-Talks/cultivator
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  
  palette:
    # Light mode with light green theme
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    
    # Dark mode with light green theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tooltips

plugins:
  - search:
      lang: en
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: iso_date

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      block_start: $$
      block_end: $$
      inline_start: $
      inline_end: $
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
      emoji_index: !!python/name:pymdownx.emoji.twemoji
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_highlight
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting Started:
    - Introduction: getting-started/index.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - Overview: user-guide/index.md
    - Features: user-guide/features.md
    - Configuration: user-guide/configuration.md
    - Workflows: user-guide/workflows.md
  - Architecture:
    - Design: architecture/design.md
    - External Modules: architecture/external-modules.md
  - Development:
    - Contributing: development/contributing.md
    - Development Guide: development/development.md
  - FAQ: faq.md

extra:
  analytics:
    provider: google
    property: G-XXXXXXX
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ops-Talks/cultivator
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/cultivator

extra_css:
  - stylesheets/custom.css

copyright: Copyright &copy; 2024-2026 Cultivator Project
