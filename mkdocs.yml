site_name: Cultivator
site_description: CI/CD automation tool for Terragrunt workflows
site_url: https://Ops-Talks.github.io/cultivator
repo_url: https://github.com/Ops-Talks/cultivator
repo_name: Ops-Talks/cultivator
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - navigation.instant
    - navigation.instant.loading
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search:
      lang: en

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  analytics:
    provider: google
    property: G-XXXXXXX
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ops-Talks/cultivator

extra_css:
  - stylesheets/custom.css

copyright: Copyright &copy; 2024-2026 Cultivator Project

nav:
  - Home: index.md
  - Getting Started:
    - Introduction: getting-started/index.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Overview: user-guide/index.md
    - Features: user-guide/features.md
    - CLI Reference: user-guide/cli-reference.md
    - GitHub Actions: user-guide/github-actions.md
    - GitLab Pipelines: user-guide/gitlab-pipelines.md
  - Architecture:
    - Design: architecture/design.md
    - External Modules: architecture/external-modules.md
  - Development:
    - Contributing: development/contributing.md
    - Development Guide: development/development.md
    - Testing Guide: development/TESTING.md
  - FAQ: faq.md
