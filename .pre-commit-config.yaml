# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_language_version:
  python: python3

repos:
  # General hooks for all files
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Go specific hooks
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.1
    hooks:
      # Format code with gofmt
      - id: go-fmt
        args: [-w, -s]
        
      # Organize imports with goimports
      - id: go-imports
        args: [-w, -local, github.com/Ops-Talks/cultivator]
        
      # Run go vet
      - id: go-vet
        
      # Run go test (only for changed packages)
      - id: go-test
        args: [-race, -timeout=30s]
        
      # Run go mod tidy
      - id: go-mod-tidy
        
      # Check for common mistakes
      - id: go-critic
        
      # Static analysis
      - id: go-build
        args: [-o, /dev/null, ./cmd/cultivator]

  # GolangCI-Lint (comprehensive linting)
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.55.2
    hooks:
      - id: golangci-lint
        args:
          - --config=.golangci.yml
          - --timeout=5m
          - --issues-exit-code=1

  # Security scanning
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.63.5
    hooks:
      - id: trufflehog
        name: TruffleHog (secret scanning)
        args:
          - --no-update
          - filesystem
          - --directory=.
          - --fail
          - --entropy=true
          - --regex=true
        exclude: '(\.git|go\.sum|\.pre-commit-config\.yaml)$'

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: [--fix]
        exclude: '(CHANGELOG\.md|docs/CLEAN_CODE_REFACTORING\.md)$'

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args: [-d, '{extends: default, rules: {line-length: {max: 120}, document-start: disable}}']
