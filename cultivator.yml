version: 1

# Define projects/directories to manage
projects:
  - name: production
    dir: environments/production
    terragrunt_version: 0.55.0
    terraform_version: 1.7.0
    apply_requirements:
      - approved
      - mergeable
    auto_plan: true

  - name: staging
    dir: environments/staging
    terragrunt_version: 0.55.0
    terraform_version: 1.7.0
    apply_requirements:
      - approved
    auto_plan: true

  - name: development
    dir: environments/dev
    terragrunt_version: 0.55.0
    terraform_version: 1.7.0
    auto_plan: true

# Global settings
settings:
  # Automatically run plan when PR is opened/updated
  auto_plan: true
  
  # Timeout for acquiring locks
  lock_timeout: 10m
  
  # Run plans in parallel when possible
  parallel_plan: true
  
  # Maximum number of parallel operations
  max_parallel: 5

# Hooks - run custom commands at different stages
hooks:
  # Run before plan
  pre_plan:
    - echo "Running pre-plan checks..."
    - terragrunt validate-all
    
  # Run after plan
  post_plan:
    - echo "Plan completed"
    
  # Run before apply
  pre_apply:
    - echo "Starting apply..."
    
  # Run after apply
  post_apply:
    - echo "Apply completed successfully"
