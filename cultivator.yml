# cultivator.yml — example Cultivator configuration file
# Pass this file explicitly: cultivator plan --config=cultivator.yml

# Root directory to scan for terragrunt.hcl files
root: live

# Environment filter (matches first directory component under root)
env: dev

# Maximum number of stacks to run in parallel (default: number of CPUs)
parallelism: 4

# Add -input=false to every Terragrunt invocation
non_interactive: true

# Only print commands without executing them
dry_run: false

# Print a Mermaid.js dependency graph before execution
show_graph: false

# Run only modules affected by Git changes
changed_only: false

# Git ref to compare against when changed_only is true
base_ref: main

# Path filters (relative to root)
include: []
exclude: []

# Tag filters (matches # cultivator:tags=... comments in terragrunt.hcl)
tags: []

# Subcommand defaults
plan:
  destroy: false
apply:
  auto_approve: false
destroy:
  auto_approve: false
