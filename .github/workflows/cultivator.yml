name: Cultivator Plan & Apply

on:
  pull_request:
    paths:
      - 'live/**'
      - 'cultivator.yml'
      - '.github/workflows/cultivator.yml'
  push:
    branches:
      - main
    paths:
      - 'live/**'
      - 'cultivator.yml'

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          
      - name: Build Cultivator
        run: make build
        
      - name: Setup Terraform/Terragrunt
        run: |
          # Install Terragrunt
          mkdir -p ~/.local/bin
          curl -L https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64 \
            -o ~/.local/bin/terragrunt
          chmod +x ~/.local/bin/terragrunt
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Run Cultivator plan
        id: plan
        run: ./cultivator plan --root=live --env=dev --non-interactive 2>&1 | tee plan-output.txt

      - name: Post plan output as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('plan-output.txt', 'utf8').trim();
            const body = [
              '## Cultivator Plan',
              '```',
              output,
              '```',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## Cultivator Plan';
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Cache Terragrunt
        uses: actions/cache@v4
        with:
          path: .terragrunt-cache
          key: terragrunt-cache-${{ hashFiles('**/terragrunt.hcl') }}
          restore-keys: |
            terragrunt-cache-

  apply:
    name: Terragrunt Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          
      - name: Build Cultivator
        run: make build
        
      - name: Setup Terraform/Terragrunt
        run: |
          mkdir -p ~/.local/bin
          curl -L https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64 \
            -o ~/.local/bin/terragrunt
          chmod +x ~/.local/bin/terragrunt
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Cache Terragrunt
        uses: actions/cache@v4
        with:
          path: .terragrunt-cache
          key: terragrunt-cache-${{ hashFiles('**/terragrunt.hcl') }}
          restore-keys: |
            terragrunt-cache-
        
      - name: Run Cultivator apply
        run: ./cultivator apply --root=live --env=prod --non-interactive --auto-approve
