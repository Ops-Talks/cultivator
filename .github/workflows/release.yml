name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=${GITHUB_SHA:0:7}
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "Building version: $VERSION"
          echo "Commit: $COMMIT"
          echo "Date: $DATE"

          # Linux AMD64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE" \
            -o dist/cultivator-linux-amd64 \
            ./cmd/cultivator

          # Linux ARM64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE" \
            -o dist/cultivator-linux-arm64 \
            ./cmd/cultivator

          # macOS AMD64
          GOOS=darwin GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE" \
            -o dist/cultivator-darwin-amd64 \
            ./cmd/cultivator

          # macOS ARM64
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE" \
            -o dist/cultivator-darwin-arm64 \
            ./cmd/cultivator

          # Windows AMD64
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE" \
            -o dist/cultivator-windows-amd64.exe \
            ./cmd/cultivator

          # List built binaries
          echo "Built binaries:"
          ls -lh dist/

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/cultivator-*
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
