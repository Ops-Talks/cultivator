# .golangci.yml
# GolangCI-Lint configuration
# See https://golangci-lint.run/usage/configuration/ for more options

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    # Enabled by default
    - gofmt          # Checks whether code was gofmt-ed
    - govet          # Reports suspicious constructs
    - errcheck       # Checks for unchecked errors
    - staticcheck    # Static analysis
    - unused         # Checks for unused code
    - gosimple       # Simplify code
    - ineffassign    # Detects ineffectual assignments
    - typecheck      # Type-checks Go code
    
    # Additional recommended linters
    - goimports      # Checks import statements formatting
    - goconst        # Finds repeated strings that could be replaced by constants
    - misspell       # Finds commonly misspelled English words
    - unconvert      # Removes unnecessary type conversions
    - dupl           # Detects code duplication (DRY principle)
    - gocyclo        # Checks function complexity
    - gocognit       # Checks cognitive complexity
    - gosec          # Security-focused linter
    - prealloc       # Finds slice declarations that could potentially be pre-allocated
    - revive         # Fast, configurable, extensible, flexible, and beautiful linter for Go
    - exportloopref  # Checks for pointers to enclosing loop variables
    - gocritic       # Provides diagnostics that check for bugs, performance and style issues
    - nolintlint     # Reports ill-formed or insufficient nolint directives
    - errorlint      # Finds code that will cause problems with error wrapping
    - whitespace     # Detects leading and trailing whitespace
    - bodyclose      # Checks whether HTTP response body is closed successfully
    - nilerr         # Finds code that returns nil even if it checks that the error is not nil
    - predeclared    # Finds code that shadows predeclared identifiers
    - stylecheck     # Stylecheck is a replacement for golint
    - thelper        # Detects test helpers without t.Helper() call
    - wastedassign   # Finds wasted assignment statements
    - durationcheck  # Checks for two durations multiplied together
    - exhaustive     # Checks exhaustiveness of enum switch statements
    
  disable:
    - funlen         # Disabled - large functions may be necessary
    - lll            # Disabled - line length is handled by gofmt
    - cyclop         # Disabled - using gocyclo instead
    - wrapcheck      # Disabled - too strict for this project
    - testpackage    # Disabled - tests in same package are fine
    - nlreturn       # Disabled - too opinionated
    - wsl            # Disabled - too opinionated

linters-settings:
  gofmt:
    simplify: true
    
  goimports:
    local-prefixes: github.com/weyderfs/cultivator
    
  govet:
    check-shadowing: true
    enable-all: true
    
  errcheck:
    check-type-assertions: true
    check-blank: true
    
  goconst:
    min-len: 3
    min-occurrences: 3
    
  dupl:
    threshold: 100
    
  gocyclo:
    min-complexity: 15
    
  gocognit:
    min-complexity: 20
    
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104  # Audit errors not checked (covered by errcheck)
      - G304  # File path provided as taint input (necessary for file operations)
      
  misspell:
    locale: US
    
  revive:
    severity: warning
    confidence: 0.8
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id
      
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
      - opinionated
    disabled-checks:
      - commentFormatting
      - whyNoLint
      
  stylecheck:
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
    
  nolintlint:
    allow-unused: false
    allow-leading-space: false
    require-explanation: true
    require-specific: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst
        
    # Exclude known false positives
    - linters:
        - staticcheck
      text: "SA9003:"
      
    # Exclude some revive rules in tests
    - path: _test\.go
      text: "unused-parameter"
      linters:
        - revive
        
  # Show all issues from a linter
  exclude-dirs:
    - vendor
    - tmp
    - dist
    
  # Independently from option `exclude` we use default exclude patterns,
  # it can be disabled by this option.
  exclude-use-default: true
